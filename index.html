<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentAi - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <h1>StudentAi</h1>
        <form id="authForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="signInBtn" class="btn-primary">Sign In</button>
            <button type="button" id="signUpBtn" class="btn-secondary">Sign Up</button>
        </form>
    </div>

    <script>
        // Nahraďte tímto:
const supabase = supabase.createClient(
  'https://hyjfojopykwtuogjvbdf.supabase.co', 
  'sb_publishable_e2OLtHbny_1llX2T...' );
        

        const form = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Sign In
        document.getElementById('signInBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.signInWithPassword({
                email: emailInput.value,
                password: passwordInput.value
            });
            if (error) alert(error.message);
            else window.location.href = 'dashboard.html';
        });

        // Sign Up
        document.getElementById('signUpBtn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signUp({
                email: emailInput.value,
                password: passwordInput.value
            });
            if (error) alert(error.message);
            else alert('Check your email for confirmation!');
        });
    </script>
</body>
</html>
